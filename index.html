<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Idea Picker</title>
  <style>
    :root {
      --bg: #f8edff;
      --panel: #ffffff;
      --panel-border: #eadcf7;
      --text: #3b2f52;
      --muted: #7e6f96;
      --primary: #9b5de5;
      --primary-hover: #8749d3;
      --soft: #f8f0ff;
      --soft-border: #ddc8f4;
      --shadow-lg: 0 28px 60px rgba(109, 66, 164, 0.14);
      --shadow-md: 0 12px 26px rgba(109, 66, 164, 0.12);
      --shadow-sm: 0 4px 10px rgba(109, 66, 164, 0.1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 30px 16px;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, #fff6fc, transparent 58%),
        linear-gradient(160deg, #ffeef8 0%, var(--bg) 55%, #f2e8ff 100%);
    }

    .app {
      width: min(100%, 780px);
      background-color: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 20px;
      padding: 36px;
      box-shadow: var(--shadow-lg);
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 2.7rem);
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .slot {
      min-height: 180px;
      width: min(100%, 560px);
      margin: 0 auto 26px;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 30px 22px;
      border-radius: 18px;
      border: 1px solid var(--panel-border);
      background: linear-gradient(170deg, #ffffff 0%, #fff7fc 52%, #faf3ff 100%);
      box-shadow: var(--shadow-md);
    }

    .result {
      margin: 0;
      font-size: clamp(1.35rem, 3vw, 2rem);
      font-weight: 600;
      line-height: 1.2;
      max-width: 100%;
      word-break: break-word;
    }

    .result.placeholder {
      color: var(--muted);
      font-weight: 500;
    }

    .result.picking {
      animation: shimmer 0.6s ease infinite;
    }

    .result.fade-in {
      animation: fade-in 340ms ease both;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin: 0 0 24px;
    }

    button {
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 11px 18px;
      font: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 160ms ease, transform 120ms ease, box-shadow 160ms ease, border-color 160ms ease, color 160ms ease, opacity 120ms ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }

    button:active:not(:disabled) {
      transform: translateY(0);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
      box-shadow: none;
    }

    .primary {
      background: var(--primary);
      color: #ffffff;
      border-color: var(--primary);
    }

    .primary:hover:not(:disabled) {
      background: var(--primary-hover);
      border-color: var(--primary-hover);
    }

    .secondary {
      background: var(--soft);
      color: var(--text);
      border-color: var(--soft-border);
    }

    .textarea-wrap {
      display: grid;
      gap: 9px;
    }

    label {
      font-weight: 600;
      font-size: 0.95rem;
      text-align: center;
      color: var(--muted);
    }

    textarea {
      width: 100%;
      min-height: 200px;
      resize: vertical;
      border-radius: 14px;
      border: 1px solid var(--panel-border);
      padding: 14px 16px;
      font: inherit;
      color: var(--text);
      background: #ffffff;
      outline: none;
      line-height: 1.55;
      box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.04);
    }

    textarea:focus {
      border-color: #c39ae7;
      box-shadow: 0 0 0 4px rgba(195, 154, 231, 0.2);
    }

    .footer {
      margin-top: 14px;
      text-align: center;
      color: var(--muted);
      font-size: 0.92rem;
    }

    @keyframes shimmer {
      0% { opacity: 0.58; }
      50% { opacity: 1; }
      100% { opacity: 0.58; }
    }

    @keyframes fade-in {
      0% {
        opacity: 0;
        transform: translateY(8px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      .app {
        padding: 24px 18px;
        border-radius: 16px;
      }

      .slot {
        min-height: 150px;
        padding: 24px 16px;
      }

      .controls {
        gap: 9px;
      }

      button {
        flex: 1 1 calc(50% - 9px);
        min-width: 140px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <h1>Idea Picker</h1>
      <p class="subtitle">Collect your projects, then let chance pick your next build.</p>
    </header>

    <section class="slot" aria-live="polite">
      <p id="result" class="result placeholder">Your picked idea will appear here</p>
    </section>

    <div class="controls">
      <button id="pickButton" class="primary" type="button">Pick One</button>
      <button id="removeButton" class="secondary" type="button" disabled>Remove picked idea</button>
      <button id="clearButton" class="secondary" type="button">Clear all</button>
    </div>

    <div class="textarea-wrap">
      <label for="ideasInput">Ideas (one per line)</label>
      <textarea id="ideasInput" placeholder="Build a study tracker&#10;Create a recipe finder&#10;Make a habit challenge app"></textarea>
    </div>

    <p class="footer"><span id="count">0</span> ideas ready to pick</p>
  </main>

  <script>
    const STORAGE_KEY = "idea-picker-ideas";

    const ideasInput = document.getElementById("ideasInput");
    const pickButton = document.getElementById("pickButton");
    const removeButton = document.getElementById("removeButton");
    const clearButton = document.getElementById("clearButton");
    const result = document.getElementById("result");
    const count = document.getElementById("count");

    let currentPick = "";
    let pickTimer = null;

    function parseIdeas(text) {
      return text
        .split("\n")
        .map((line) => line.trim())
        .filter(Boolean);
    }

    function setIdeas(ideas) {
      const cleanIdeas = ideas.filter(Boolean);
      ideasInput.value = cleanIdeas.join("\n");
      localStorage.setItem(STORAGE_KEY, JSON.stringify(cleanIdeas));
      updateCount(cleanIdeas.length);
      updateButtons();
    }

    function getIdeas() {
      return parseIdeas(ideasInput.value);
    }

    function updateCount(total) {
      count.textContent = total;
    }

    function updateButtons() {
      const ideas = getIdeas();
      pickButton.disabled = ideas.length === 0;
      removeButton.disabled = !currentPick || !ideas.includes(currentPick);
    }

    function showPlaceholder(message) {
      result.textContent = message;
      result.classList.add("placeholder");
      result.classList.remove("picking", "fade-in");
    }

    function showPickedIdea(idea) {
      result.classList.remove("fade-in");
      void result.offsetWidth;
      result.textContent = idea;
      result.classList.remove("placeholder", "picking");
      result.classList.add("fade-in");
    }

    function saveFromTextarea() {
      const ideas = getIdeas();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(ideas));

      if (currentPick && !ideas.includes(currentPick)) {
        currentPick = "";
      }

      if (!ideas.length) {
        currentPick = "";
        showPlaceholder("Your picked idea will appear here");
      }

      updateCount(ideas.length);
      updateButtons();
    }

    function randomIdea(ideas) {
      return ideas[Math.floor(Math.random() * ideas.length)];
    }

    function pickIdea() {
      const ideas = getIdeas();
      if (!ideas.length) {
        showPlaceholder("Add a few ideas to get started");
        updateButtons();
        return;
      }

      pickButton.disabled = true;
      removeButton.disabled = true;
      result.classList.remove("placeholder", "fade-in");
      result.classList.add("picking");

      let ticks = 0;
      const totalTicks = 16;

      clearInterval(pickTimer);
      pickTimer = setInterval(() => {
        result.textContent = randomIdea(ideas);
        ticks += 1;

        if (ticks >= totalTicks) {
          clearInterval(pickTimer);
          currentPick = randomIdea(ideas);
          showPickedIdea(currentPick);
          updateButtons();
        }
      }, 85);
    }

    function removePickedIdea() {
      if (!currentPick) {
        return;
      }

      const ideas = getIdeas().filter((idea) => idea !== currentPick);
      setIdeas(ideas);
      showPlaceholder(ideas.length ? "Picked idea removed. Spin again." : "No ideas left. Add more to continue.");
      currentPick = "";
      updateButtons();
    }

    function clearAll() {
      currentPick = "";
      setIdeas([]);
      localStorage.removeItem(STORAGE_KEY);
      showPlaceholder("Your picked idea will appear here");
      ideasInput.focus();
    }

    function loadIdeas() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
        if (Array.isArray(saved)) {
          setIdeas(saved.map((item) => String(item).trim()).filter(Boolean));
          return;
        }
      } catch (error) {
        console.error("Failed to load saved ideas", error);
      }

      setIdeas([]);
    }

    ideasInput.addEventListener("input", saveFromTextarea);
    pickButton.addEventListener("click", pickIdea);
    removeButton.addEventListener("click", removePickedIdea);
    clearButton.addEventListener("click", clearAll);

    loadIdeas();
    showPlaceholder("Your picked idea will appear here");
  </script>
</body>
</html>
